<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0e1f"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#667eea"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="none" stroke="url(#g)" stroke-width="1" opacity="0.35"/>

  <!-- Controller body -->
  <path d="M10 26 C10 20 15 18 20 18 L44 18 C49 18 54 20 54 26 L54 36 C54 44 48 46 44 46 L38 46 C36 46 34 44 32 44 C30 44 28 46 26 46 L20 46 C16 46 10 44 10 36 Z"
        fill="url(#g)" opacity="0.15" filter="url(#glow)"/>
  <path d="M10 26 C10 20 15 18 20 18 L44 18 C49 18 54 20 54 26 L54 36 C54 44 48 46 44 46 L38 46 C36 46 34 44 32 44 C30 44 28 46 26 46 L20 46 C16 46 10 44 10 36 Z"
        fill="none" stroke="url(#g)" stroke-width="2" filter="url(#glow)"/>

  <!-- D-pad vertical -->
  <rect x="19" y="24" width="4" height="12" rx="1.5" fill="url(#g)"/>
  <!-- D-pad horizontal -->
  <rect x="15" y="28" width="12" height="4" rx="1.5" fill="url(#g)"/>

  <!-- Buttons -->
  <circle cx="42" cy="26" r="2.5" fill="url(#g)" opacity="0.6"/>
  <circle cx="48" cy="30" r="2.5" fill="url(#g)"/>
  <circle cx="42" cy="34" r="2.5" fill="url(#g)" opacity="0.6"/>
  <circle cx="36" cy="30" r="2.5" fill="url(#g)" opacity="0.8"/>

  <!-- Center button -->
  <circle cx="32" cy="24" r="3" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.7"/>
  <circle cx="32" cy="24" r="1.2" fill="url(#g)" opacity="0.7"/>
</svg>
